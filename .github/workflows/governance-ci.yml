name: Governance CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  governance-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate test signing keys
        run: |
          openssl genpkey -algorithm Ed25519 -out manthan_bundle_key
          openssl pkey -in manthan_bundle_key -pubout -out manthan_bundle_key.pub

      - name: Run governance validation
        run: npm run check