name: Governance CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  governance-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate deterministic test keys
        run: npx tsx tests/generate-keys.ts

      - name: Run deterministic governance validation
        run: npm run check